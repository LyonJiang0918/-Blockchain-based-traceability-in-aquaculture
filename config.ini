[rpc]
    listen_ip = 0.0.0.0
    listen_port = 20200
    disallow_trusted_ip = false

[p2p]
    listen_ip = 0.0.0.0
    listen_port = 30300
    nodes = []

[network_security]
    directory = .
    ca_cert = ca.crt
    ssl_cert = ssl.crt
    ssl_key = ssl.key

[storage_security]
    enable = false

[storage]
    type = RocksDB

[tx_pool]
    limit = 150000

[consensus]
    consensus_type = pbft
    leader_period = 1

[log]
    log_path = ./logs
    level = INFO
