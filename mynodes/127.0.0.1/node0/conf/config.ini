[rpc]
    listen_ip = "0.0.0.0"
    listen_port = 20200
    disdirected = false
    node_num = 5000

[p2p]
    listen_ip = "0.0.0.0"
    listen_port = 30300

[log]
    log_path = "./log"
    log_level = INFO

[performance]
    tx_pool_size = 1500

[network]
    ssl = true
    ca_path = "conf/ca.crt"
    node_crt_path = "conf/ssl.crt"
    node_key_path = "conf/ssl.key"

[consensus]
    consensus_type = pbft

[executor]
    is_wasm = false