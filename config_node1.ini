[rpc]
    listen_ip = 0.0.0.0
    listen_port = 20201
    disallow_trusted_ip = false

[p2p]
    listen_ip = 0.0.0.0
    listen_port = 30301
    nodes = []

[certificate_authority]
    ca_path = conf/ca.crt

[network_security]
    directory = conf
    ca_cert = ca.crt
    ssl_cert = ssl.crt
    ssl_key = ssl.key

[storage_security]
    enable = false
    key_manager_url =

[storage]
    type = RocksDB
    max_capacity = 256G
    max_forward_block_number = 10

[tx_pool]
    limit = 150000

[consensus]
    consensus_type = PBFT
    leader_period = 1
    interval_block_time = 1000

[log]
    log_path = ./logs
    level = INFO
    enable_rotate = true
    max_log_file_size = 200M
    max_log_file_num = 10
